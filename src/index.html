<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MacroSpend Tracker</title>
    <style>
      :root { color-scheme: light; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        margin: 0;
        padding: 24px;
        background: #ffffff;
        color: #0B0F14;
        min-width: 320px;
      }
      h1 { font-size: 16px; margin: 0 0 4px; font-weight: 600; }
      p { font-size: 13px; color: #4b5563; margin: 0 0 16px; }
      .status { display: flex; align-items: center; gap: 8px; padding: 12px;
                background: #f3f4f6; border-radius: 8px; font-size: 13px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; }
      .dot.paused { background: #f59e0b; }
      .dot.error { background: #ef4444; }
      button { margin-top: 12px; padding: 8px 14px; border: 1px solid #e5e7eb;
               background: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
      button:hover { background: #f9fafb; }
      .hint { font-size: 11px; color: #9ca3af; margin-top: 12px; }
    </style>
  </head>
  <body>
    <h1>MacroSpend Tracker</h1>
    <p>Running quietly in your menu bar.</p>
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="status">Connected</span>
    </div>
    <button id="toggle">Pause sampling</button>
    <p class="hint">Right-click the tray icon for more options.</p>
    <script type="module">
      import { invoke } from "https://esm.sh/@tauri-apps/api/core@2";
      const dot = document.getElementById("dot");
      const status = document.getElementById("status");
      const toggle = document.getElementById("toggle");
      let paused = false;
      async function refresh() {
        const s = await invoke("get_status").catch(() => ({ paused: false, connected: true }));
        paused = s.paused;
        dot.className = "dot" + (paused ? " paused" : s.connected ? "" : " error");
        status.textContent = paused ? "Paused" : s.connected ? "Connected" : "Disconnected";
        toggle.textContent = paused ? "Resume sampling" : "Pause sampling";
      }
      toggle.addEventListener("click", async () => {
        await invoke(paused ? "resume_sampling" : "pause_sampling");
        refresh();
      });
      refresh();
      setInterval(refresh, 5000);
    </script>
  </body>
</html>
